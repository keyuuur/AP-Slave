name: Offline governance validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Python 3.12 offline contract checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      # These checks consume only repository files and credential-free fixtures.
      # They must not contact sportsbooks, providers, league sites, or AP Frankenstein.
      - name: Validate governance contracts offline
        env:
          AP_SLAVE_VALIDATION_OFFLINE: "1"
        run: python -m ap_slave_validation --root .

      - name: Run credential-free tests offline
        env:
          AP_SLAVE_VALIDATION_OFFLINE: "1"
        run: python -m pytest
