# Credential-free Golf event manifest. Do not embed screenshots, account data,
# personal data, credentials, session data, raw sportsbook payloads, or private paths.
schema_version: golf_event_source_pack_v1
pack_id: null
created_at_utc: null
source_evidence_bundle_id: null

privacy_and_storage:
  credential_free: true
  manifest_only: true
  contains_raw_screenshots: false
  contains_raw_payloads: false
  contains_personal_data: false
  contains_account_identifiers: false
  contains_credentials_or_session_data: false
  raw_evidence_committed_to_repository: false
  hash_algorithm: sha256

jurisdiction_and_book:
  country: US
  state: MO
  state_name: Missouri
  exact_sportsbook: null
  # Only FanDuel or DraftKings is within this adapter's discovery scope.
  allowed_sportsbooks:
    - FanDuel
    - DraftKings
  exact_displayed_product: null
  missouri_display_verified: false
  sportsbook_listing_is_discovery_only: true
  listing_does_not_establish_adapter_support: true

event_and_competition_identity:
  canonical_event_id: null
  exact_displayed_event_name: null
  organizer_or_sanctioning_body: null
  tour_or_series: null
  competition_name: null
  event_edition: null
  format: individual_stroke_play
  scheduled_start_at_utc: null
  scheduled_end_at_utc: null
  venue: null
  course_or_course_rotation: []
  field_version_id: null
  field_version_published_at_utc: null
  official_field_hash_sha256: null
  organizer_and_competition_verified: false

competition_rules:
