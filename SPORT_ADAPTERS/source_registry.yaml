schema_version: source_registry_v1

registry_metadata:
  title: "Advantage Play Intern source and evidence registry"
  default_jurisdiction: "US-MO"
  created_on: "2026-07-13"
  network_validation_performed: false
  provider_certification_claimed: false

closed_vocabularies:
  record_type: [concrete_source, source_class, terms_source, season_artifact, event_pack]
  access_mode: [manual_on_demand, user_supplied_manual_evidence, documented_public_api, licensed_feed, unconfigured]
  automation_permission: [permitted_with_conditions, prohibited, license_required, unresolved]
  permission_status: [conditionally_reviewed, source_specific_review_required, unresolved]
  coverage_status: [exact_scope_documented, instance_required, provider_validation_pending, wrong_season, supporting_only]
  origin_resolution_status: [resolved, unresolved, target_excluded]

registry_rules:
  source_identity: "A source record identifies provenance and permission; it never proves pricing independence."
  url_health: "A reachable URL proves only reachability, not permission, exact coverage, jurisdiction, freshness, or pricing independence."
  exact_coverage: "Generic classes require a registered source instance and per-run evidence before clearing a gate."
  jurisdiction: "National, other-state, or general rules cannot establish Missouri sportsbook terms."
  season_scope: "A season-specific artifact cannot clear a later season; the applicable artifact and interpreted policy must be reverified."
  target_exclusion: "Every target sportsbook alias and pricing origin is excluded from fair probability and comparison coverage."
  unresolved_origin: "An unresolved pricing origin contributes zero independent origins."
  duplicate_origin: "Aliases, skins, feeds, or provider records sharing one pricing origin count once."
  restricted_statistics: "League-owned restricted statistics remain excluded from gambling-related models."
  weather_boundary: "NWS and other weather sources may clear operational gates only and never change probability."

pricing_origin_groups:
  - pricing_origin_id: sportsbook_fanduel
    canonical_name: FanDuel
    known_aliases: [FanDuel, "FanDuel Sportsbook"]
    origin_resolution_status: resolved
    certification_scope: "identity de-duplication only; no feed, market, or jurisdiction certification"
  - pricing_origin_id: sportsbook_draftkings
    canonical_name: DraftKings
    known_aliases: [DraftKings, "DraftKings Sportsbook"]
    origin_resolution_status: resolved
    certification_scope: "identity de-duplication only; no feed, market, or jurisdiction certification"
  - pricing_origin_id: unresolved
    canonical_name: "Unresolved pricing origin"
    known_aliases: []
    origin_resolution_status: unresolved
    certification_scope: "counts as zero independent origins"

source_families:
  - source_family_id: official_league_event_source
    purpose: "official schedule, event identity, venue, and status"
  - source_family_id: official_league_availability_source
    purpose: "official injury, inactive, roster, transaction, or participant status"
  - source_family_id: official_team_announcement
    purpose: "named team or club operational fact; exact instance and platform permission required"
  - source_family_id: official_competition_rules
    purpose: "season- or event-specific competition and settlement identity"
  - source_family_id: government_operational_weather
    purpose: "venue-matched operational weather gate only"
  - source_family_id: sportsbook_target_manual_evidence
    purpose: "exact displayed target quote, promotion, jurisdiction, and house-rule evidence"
  - source_family_id: sportsbook_comparison_manual_evidence
    purpose: "one exact non-target comparison market and its complete outcome set"
  - source_family_id: permitted_sportsbook_feed
    purpose: "exact sportsbook feed after separate permission and coverage review"
  - source_family_id: licensed_sports_data_provider
    purpose: "licensed operational sports facts after contract review"
  - source_family_id: licensed_multi_book_odds_provider
    purpose: "licensed odds records after book, market, jurisdiction, and origin review"
  - source_family_id: secondary_reporting_lead
    purpose: "early material-change lead that cannot clear a gate alone"
  - source_family_id: golf_official_event_source
    purpose: "event-specific organizer, field, format, cut, tee-time, status, and result facts"

