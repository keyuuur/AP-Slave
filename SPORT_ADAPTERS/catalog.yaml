schema_version: adapter_catalog_v1

catalog_metadata:
  title: "Advantage Play Intern sport adapter catalog"
  default_timezone: "America/Chicago"
  adapter_record_count: 5
  profile_record_count: 21
  lifecycle_distribution:
    active: 1
    pilot_enabled: 3
    disabled_provider_validation: 17
    disabled_model_only: 0
    retired: 0

closed_vocabularies:
  profile_lifecycle:
    - active
    - pilot_enabled
    - disabled_provider_validation
    - disabled_model_only
    - retired
  contract_status:
    - draft
    - specified
  implementation_status:
    - documentation_only
    - manual_input_runtime
    - provider_integrated
  source_readiness:
    - provider_validation_pending
    - per_run_evidence_required
    - cross_timing_validated

catalog_rules:
  lifecycle_scope: "Lifecycle belongs only to a registered profile record."
  absent_profile_policy: "An absent profile is unregistered, has no lifecycle value, is unavailable for selection, and cannot be inferred or activated from provider exposure."
  provider_exposure_policy: "Provider exposure does not register or activate an adapter profile and does not prove recommendation-grade coverage."
  adapter_profile_separation: "Adapter versions describe document contracts; lifecycle and readiness fields apply to exact profile records."

